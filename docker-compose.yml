version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: siteguard_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-siteguard}
      POSTGRES_USER: ${POSTGRES_USER:-siteguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-siteguard_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Port not exposed externally — only accessible within Docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-siteguard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: siteguard_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    # Port not exposed externally — only accessible within Docker network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: siteguard_backend
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-siteguard}:${POSTGRES_PASSWORD:-siteguard_secret}@postgres:5432/${POSTGRES_DB:-siteguard}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  worker:
    image: siteguard-backend:latest
    container_name: siteguard_worker
    restart: unless-stopped
    command: ["python", "-m", "app.workers.main"]
    dns:
      - 8.8.8.8
      - 1.1.1.1
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-siteguard}:${POSTGRES_PASSWORD:-siteguard_secret}@postgres:5432/${POSTGRES_DB:-siteguard}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      backend:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
    container_name: siteguard_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
